<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topBlue" x1="120" y1="90" x2="392" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1B9A"/>
      <stop offset="1" stop-color="#273FB0"/>
    </linearGradient>

    <linearGradient id="midBlue" x1="110" y1="150" x2="400" y2="250" gradientUnits="userSpaceOnUse">
